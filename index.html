<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tele — Messenger</title>
  <meta name="theme-color" content="#07070D">
  <meta name="description" content="Experience next-level messaging with Tele">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="/src/client/styles/main.css">
</head>
<body>
  <div id="auth-screen">
    <div class="auth-bg"></div>
    <div class="auth-container">
      <div class="auth-box" id="auth-box">
        <div class="auth-logo">
          <div class="logo-icon">
            <svg width="42" height="42" viewBox="0 0 42 42" fill="none">
              <rect width="42" height="42" rx="14" fill="url(#logoG)"/>
              <path d="M13 21l7 7 11-13" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              <defs><linearGradient id="logoG" x1="0" y1="0" x2="42" y2="42"><stop stop-color="#7B6BFF"/><stop offset="1" stop-color="#F0A870"/></linearGradient></defs>
            </svg>
          </div>
          <h1>Tele</h1>
          <p class="auth-subtitle">Messaging, elevated</p>
        </div>
      </div>
    </div>
  </div>
  <div id="app-screen">
    <div class="sidebar" id="sidebar"></div>
    <div class="main-area" id="main">
      <div class="loading-screen" id="loading-screen" style="display:none">
        <div class="loader-ring">
          <svg viewBox="0 0 50 50"><circle cx="25" cy="25" r="20" fill="none" stroke="url(#logoGradient)" stroke-width="4" stroke-linecap="round" stroke-dasharray="125" stroke-dashoffset="125"><animate attributeName="stroke-dashoffset" values="125;0" dur="1.5s" repeatCount="indefinite"/></svg>
        </div>
        <p>Connecting</p>
      </div>
    </div>
  </div>
  <svg style="display:none" aria-hidden="true"><defs><linearGradient id="logoGradient" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#7B6BFF"/><stop offset="1" stop-color="#F0A870"/></linearGradient></defs></svg>
  <script type="module" src="/src/client/main.js"></script>
</body>
</html>
