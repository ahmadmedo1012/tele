<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tele — Messenger</title>
  <meta name="theme-color" content="#F0FDFA">
  <meta name="description" content="Tele — تطبيق مراسلة عصري">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="stylesheet" href="/src/client/styles/main.css">
</head>
<body>
  <div id="auth-screen">
    <div class="auth-bg"></div>
    <div class="auth-container">
      <div class="auth-box" id="auth-box">
        <div class="auth-logo">
          <div class="logo-icon">
            <svg width="42" height="42" viewBox="0 0 42 42" fill="none">
              <rect width="42" height="42" rx="14" fill="#0D9488"/>
              <path d="M13 21l7 7 11-13" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <h1>Tele</h1>
          <p class="auth-subtitle">مراسلة سريعة وآمنة</p>
        </div>
      </div>
    </div>
  </div>
  <div id="app-screen">
    <div class="sidebar" id="sidebar"></div>
    <div class="main-area" id="main">
      <div class="loading-screen" id="loading-screen" style="display:none">
        <div class="lottie-wrapper" id="loading-lottie"></div>
        <p>جاري التحميل…</p>
      </div>
    </div>
  </div>
  <svg style="display:none" aria-hidden="true"><defs><linearGradient id="logoGradient" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0D9488"/><stop offset="1" stop-color="#14B8A6"/></linearGradient></defs></svg>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  <script type="module" src="/src/client/main.js"></script>
</body>
</html>
